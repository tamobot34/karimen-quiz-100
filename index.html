<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>仮免○×クイズ（50問）</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>仮免 ○× クイズ</h1>
        <p class="sub">全50問・解説つき。回答後にすぐ正誤とポイントを確認できます。</p>
      </header>

      <section id="quiz-card" class="card">
        <div class="meta">
          <span id="progress">1 / 50</span>
          <span id="score">正解 0</span>
        </div>
        <h2 id="question"></h2>

        <div class="actions" id="answer-buttons">
          <button class="btn true" data-answer="o">○（正しい）</button>
          <button class="btn false" data-answer="x">×（誤り）</button>
        </div>

        <div id="feedback" class="feedback hidden"></div>

        <div class="nav">
          <button id="next" class="btn ghost" disabled>次の問題へ</button>
        </div>
      </section>

      <section id="result" class="card hidden"></section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
